<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン練習ページ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', 'Noto Sans JP', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1d1d1f;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
      padding: 40px 40px 36px;
      width: 100%;
      max-width: 440px;
    }

    /* ── Login page ── */

    .login-header {
      margin-bottom: 28px;
    }

    .login-header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .login-header p {
      font-size: 13px;
      color: #6e6e73;
    }

    .field-group {
      margin-bottom: 18px;
    }

    .field-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .field-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d2d2d7;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      background: #fafafa;
    }

    .field-group input:focus {
      border-color: #0071e3;
      background: #fff;
    }

    .error-msg {
      display: none;
      font-size: 13px;
      color: #ff3b30;
      background: #fff2f2;
      border: 1px solid #ffd0ce;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: #006ad4; }
    .btn-primary:active { background: #005ec0; }

    /* ── Dashboard page ── */

    .login-success {
      font-size: 22px;
      font-weight: 800;
      color: #1b5e20;
      background: #e8f5e9;
      border: 2px solid #a5d6a7;
      border-radius: 12px;
      padding: 14px 24px;
      display: block;
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: 0.05em;
    }

    .login-success::before {
      content: '✓ ';
    }

    .logged-in-msg {
      font-size: 14px;
      color: #6e6e73;
      text-align: center;
      margin-bottom: 24px;
    }

    .btn-logout {
      width: 100%;
      padding: 12px;
      background: #fff;
      color: #ff3b30;
      border: 1.5px solid #ff3b30;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-logout:hover {
      background: #fff5f5;
    }

    /* ── Footer ── */

    .footer {
      margin-top: 16px;
      font-size: 11px;
      color: #aeaeb2;
      text-align: center;
    }

    /* ── Hidden by default ── */
    [data-page] { display: none; }
  </style>
</head>
<body>

  <!-- ══ LOGIN PAGE ══ -->
  <div data-page="login" class="card">

    <div class="login-header">
      <h1>ログイン</h1>
      <p>練習用ログインページ</p>
    </div>

    <div id="error-msg" class="error-msg">
      メールアドレスまたはパスワードが違います。
    </div>

    <div class="field-group">
      <label for="email">メールアドレス</label>
      <input
        type="email"
        id="email"
        placeholder="example@mail.com"
        autocomplete="username"
      />
    </div>

    <div class="field-group">
      <label for="password">パスワード</label>
      <input
        type="password"
        id="password"
        placeholder="パスワード"
        autocomplete="current-password"
      />
    </div>

    <button class="btn-primary" id="login-btn">ログイン</button>

  </div>

  <!-- ══ DASHBOARD PAGE ══ -->
  <div data-page="dashboard" class="card">

    <div class="login-success">ログイン成功</div>
    <p class="logged-in-msg">ログインできました。</p>
    <button class="btn-logout" id="logout-btn">ログアウト</button>

  </div>

  <div class="footer">練習専用 ― 入力内容は外部へ送信されません</div>

  <script>
    var VALID_EMAIL    = 'test@test.example';
    var VALID_PASSWORD = 'pass12345';
    var SESSION_KEY    = 'login_test_auth';
    var COOKIE_NAME    = 'login_test_session';

    function saveSession() {
      var data = {
        loggedIn:  true,
        user:      VALID_EMAIL,
        loginTime: new Date().toISOString(),
      };
      localStorage.setItem(SESSION_KEY, JSON.stringify(data));
      document.cookie =
        COOKIE_NAME + '=authenticated' +
        '; path=/' +
        '; max-age=86400' +
        '; SameSite=Lax';
    }

    function clearSession() {
      localStorage.removeItem(SESSION_KEY);
      document.cookie = COOKIE_NAME + '=; path=/; max-age=0';
    }

    function loadSession() {
      var raw = localStorage.getItem(SESSION_KEY);
      if (!raw) return null;
      try { return JSON.parse(raw); } catch (e) { return null; }
    }

    function showPage(name) {
      document.querySelectorAll('[data-page]').forEach(function(el) {
        el.style.display = el.dataset.page === name ? 'block' : 'none';
      });
    }

    function showDashboard() {
      showPage('dashboard');
    }

    function showLogin() {
      showPage('login');
      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('email').value    = '';
      document.getElementById('password').value = '';
    }

    function doLogin() {
      var email    = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var errorEl  = document.getElementById('error-msg');

      if (email === VALID_EMAIL && password === VALID_PASSWORD) {
        errorEl.style.display = 'none';
        saveSession();
        showDashboard();
      } else {
        errorEl.style.display = 'block';
      }
    }

    function doLogout() {
      clearSession();
      showLogin();
    }

    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('logout-btn').addEventListener('click', doLogout);

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        var loginPage = document.querySelector('[data-page="login"]');
        if (loginPage && loginPage.style.display !== 'none') doLogin();
      }
    });

    var session = loadSession();
    if (session && session.loggedIn) {
      showDashboard(session);
    } else {
      showLogin();
    }
  </script>
</body>
</html>
